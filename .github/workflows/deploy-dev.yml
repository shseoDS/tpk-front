name: Deploy Front to Dev Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build
        run: |
          npm install
          npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      # 1. SCP 전송 전에 폴더를 생성하고 권한을 내 계정으로 변경
      - name: Prepare target directory
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          port: ${{ secrets.DEV_PORT }}
          script: |
            sudo mkdir -p /srv/tpk-mvp/fe
            sudo chown -R ${{ secrets.DEV_USER }}:${{ secrets.DEV_USER }} /srv/tpk-mvp/fe
            sudo chmod -R 755 /srv/tpk-mvp/fe

      # 2. 이제 파일 전송 (권한 문제가 해결됨)
      - name: Deploy to Server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          port: ${{ secrets.DEV_PORT }}
          source: "dist/*"
          target: "/srv/tpk-mvp/fe"
          strip_components: 1

      # 3. 배포 후 Nginx가 읽을 수 있도록 최종 권한 조정 (선택사항)
      - name: Finalize permissions
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          port: ${{ secrets.DEV_PORT }}
          script: |
            sudo chmod -R 755 /srv/tpk-mvp/fe